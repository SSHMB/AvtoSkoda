    body {
      font-family: 'Roboto', sans-serif;
      background: #0c0404;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 44%, rgba(170,12,12,0.58) 0%, rgba(90,5,5,0.3) 55%, transparent 78%),
        linear-gradient(to bottom, rgba(15,0,0,0.75) 0%, transparent 30%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .skyline {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 65%;
      z-index: 1;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 36px;
      padding-top: 24px;
    }
    nav a {
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }

    .content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -30px;
      text-align: center;
    }

    .row { display: flex; align-items: center; line-height: 1; }

    .digit {
      font-family: 'Oswald', Impact, sans-serif;
      font-size: clamp(110px, 18vw, 200px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -8px;
      text-shadow: 0 2px 50px rgba(0,0,0,0.8);
    }

    .zero-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .car-wrap {
      position: absolute;
      bottom: 13%; left: 50%;
      transform: translateX(-50%);
      width: 82%;
      pointer-events: none;
    }
    .car-wrap svg {
      width: 100%; height: auto;
      filter: drop-shadow(0 5px 18px rgba(200,10,10,0.55));

    h1 {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-top: 10px;

    .desc {

      color: rgba(255,255,255,0.5);
      max-width: 480px;
      line-height: 1.8;
      margin-top: 8px;
      font-weight: 300;
      padding: 0 16px;
    }

    .btn {
      margin-top: 24px;
      padding: 13px 38px;
      background: #bf1320;
      color: #fff;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      font-family: 'Roboto', sans-serif;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
      text-decoration: none;
    }
    .btn:hover { background: #d91825; transform: translateY(-1px); }
    .btn:active { background: #a01018; transform: translateY(0); }
